services:
  mongo:
    image: mongo:7
    container_name: diro-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: diro-backend
    restart: unless-stopped
    environment:
      NODE_ENV: development
      PORT: 3000
      CORS_ORIGIN: http://localhost:5173
      MONGODB_URI: mongodb://mongo:27017/diro
      JWT_SECRET: change-this-secret
      JWT_EXPIRES_IN: 7d
      BCRYPT_ROUNDS: 10
      INSTAGRAM_GRAPH_ENABLED: "true"
      INSTAGRAM_GRAPH_DOC_ID: 8845758582119845
      INSTAGRAM_GRAPH_CACHE_TTL_MS: 3600000
      CLOUD_NAME: ${CLOUD_NAME:-}
      CLOUD_API_KEY: ${CLOUD_API_KEY:-}
      CLOUD_API_SECRET: ${CLOUD_API_SECRET:-}
      UPLOAD_STORAGE: ${UPLOAD_STORAGE:-local}
    ports:
      - "3000:3000"
      - "9229:9229"
    command: npm run debug:seed
    depends_on:
      mongo:
        condition: service_healthy
    volumes:
      - backend_uploads:/app/uploads
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api
    container_name: diro-frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy

volumes:
  mongo_data:
  backend_uploads:
